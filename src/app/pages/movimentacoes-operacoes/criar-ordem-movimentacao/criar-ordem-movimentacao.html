<main class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="h3 fw-bold text-dark mb-0">
      <i class="bi bi-arrow-return-left-circle text-success me-2"></i>
      Ordem de Movimenta&ccedil;&atilde;o
    </h2>
  </div>

  <div class="container-fluid px-3">
    <div class="row">
      <div class="col-12">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <h6 class="fw-bold text-primary mb-3">Ordem de Movimenta&ccedil;&atilde;o</h6>

              <div class="row g-3">
                <div class="col-md-4">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="numeroOrdem">
                    <label>N&ordm; da Ordem</label>
                  </div>
                </div>

                <div class="col-md-4">
                  <div class="form-floating">
                    <select class="form-select" formControlName="tipo">
                      <option value="">Selecione</option>
                      <option value="SIMPLES">SIMPLES</option>
                      <option value="COMPLETA">COMPLETA</option>
                    </select>
                    <label>Tipo</label>
                  </div>
                </div>

                <div class="col-md-4">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="omResponsavel">
                    <label>OM Respons&aacute;vel</label>
                  </div>
                </div>
              </div>

              <div class="row g-3 mt-2">
                <div class="col-md-3">
                  <div class="form-floating">
                    <input type="datetime-local" class="form-control" formControlName="dataInicio">
                    <label>Data In&iacute;cio</label>
                  </div>
                </div>

                <div class="col-md-3">
                  <div class="form-floating">
                    <input type="datetime-local" class="form-control" formControlName="dataTermino">
                    <label>Data T&eacute;rmino</label>
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="documento">
                    <label>Documento / Refer&ecirc;ncia</label>
                  </div>
                </div>
              </div>

              <div class="form-floating mt-3">
                <textarea class="form-control" style="height: 100px;" formControlName="descricaoMov"></textarea>
                <label>Descri&ccedil;&atilde;o da movimenta&ccedil;&atilde;o</label>
              </div>

              <hr>

              <h6 class="fw-bold text-primary mb-3">Tipo de Opera&ccedil;&atilde;o</h6>

              <div class="row g-3">
                <div class="col-md-3">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="tipoOpCodigo">
                    <label>C&oacute;digo</label>
                  </div>
                </div>

                <div class="col-md-9">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="tipoOpDescricao">
                    <label>Descri&ccedil;&atilde;o</label>
                  </div>
                </div>
              </div>

              <hr>

              <h6 class="fw-bold text-primary mb-3">Opera&ccedil;&atilde;o Militar</h6>

              <div class="row g-3">
                <div class="col-md-5">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="opNome">
                    <label>Nome da Opera&ccedil;&atilde;o</label>
                  </div>
                </div>

                <div class="col-md-3">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="opSigla">
                    <label>Sigla</label>
                  </div>
                </div>

                <div class="col-md-4">
                  <div class="form-floating">
                    <input type="text" class="form-control" formControlName="opTipo">
                    <label>Tipo</label>
                  </div>
                </div>
              </div>

              <div class="form-floating mt-3">
                <textarea class="form-control" style="height: 100px;" formControlName="opDescricao"></textarea>
                <label>Descri&ccedil;&atilde;o da opera&ccedil;&atilde;o</label>
              </div>

              <hr>

              <div class="alert alert-success" *ngIf="submitMessage">
                {{ submitMessage }}
              </div>

              <div class="d-flex justify-content-end gap-2 flex-wrap">
                <button type="button" class="btn btn-outline-secondary" (click)="clearForm()">
                  <i class="bi bi-eraser"></i>
                  Limpar
                </button>

                <button type="submit" class="btn btn-success px-4" [disabled]="form.invalid">
                  <i class="bi bi-check-circle"></i>
                  Emitir Ordem
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
