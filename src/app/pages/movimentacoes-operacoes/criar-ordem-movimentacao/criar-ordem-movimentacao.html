<main class="ordem-page">
  <form class="ordem-form-shell" [formGroup]="form" (ngSubmit)="onSubmit()">
    <header class="ordem-page-header">
      <div class="page-icon">
        <i class="bi bi-file-earmark-text-fill"></i>
      </div>

      <div>
        <h1 class="page-title">Ordem de Movimenta&ccedil;&atilde;o</h1>
        <p class="page-subtitle">Preencha os dados abaixo para criar uma nova ordem de movimenta&ccedil;&atilde;o.</p>
      </div>
    </header>

    <section class="ordem-panel">
      <div class="panel-header">
        <i class="bi bi-file-earmark-richtext-fill"></i>
        <h2>Dados da Ordem</h2>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <label class="form-label" for="numeroOrdem">N&ordm; da Ordem</label>
          <input
            id="numeroOrdem"
            type="text"
            class="form-control form-control-lg"
            formControlName="numeroOrdem"
            placeholder="Informe o n&ordm; da ordem">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="tipo">Tipo</label>
          <select id="tipo" class="form-select form-select-lg" formControlName="tipo">
            <option value="">Selecione</option>
            <option value="SIMPLES">SIMPLES</option>
            <option value="COMPLETA">COMPLETA</option>
          </select>
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="omResponsavel">OM Respons&aacute;vel</label>
          <input
            id="omResponsavel"
            type="text"
            class="form-control form-control-lg"
            formControlName="omResponsavel"
            placeholder="Informe a OM respons&aacute;vel">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="dataInicio">Data In&iacute;cio</label>
          <input
            id="dataInicio"
            type="date"
            class="form-control form-control-lg"
            formControlName="dataInicio">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="dataTermino">Data T&eacute;rmino</label>
          <input
            id="dataTermino"
            type="date"
            class="form-control form-control-lg"
            formControlName="dataTermino">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="documento">Documento / Refer&ecirc;ncia</label>
          <input
            id="documento"
            type="text"
            class="form-control form-control-lg"
            formControlName="documento"
            placeholder="Informe o documento ou refer&ecirc;ncia">
        </div>

        <div class="col-12">
          <label class="form-label" for="descricaoMov">Descri&ccedil;&atilde;o da movimenta&ccedil;&atilde;o</label>
          <textarea
            id="descricaoMov"
            class="form-control form-control-lg textarea-control"
            formControlName="descricaoMov"
            placeholder="Informe a descri&ccedil;&atilde;o da movimenta&ccedil;&atilde;o"></textarea>
        </div>
      </div>
    </section>

    <section class="ordem-panel">
      <div class="panel-header">
        <i class="bi bi-gear-fill"></i>
        <h2>Tipo de Opera&ccedil;&atilde;o</h2>
      </div>

      <div class="row g-3">
        <div class="col-lg-6">
          <label class="form-label" for="tipoOpCodigo">C&oacute;digo</label>
          <input
            id="tipoOpCodigo"
            type="text"
            class="form-control form-control-lg"
            formControlName="tipoOpCodigo"
            placeholder="Informe o c&oacute;digo">
        </div>

        <div class="col-lg-6">
          <label class="form-label" for="tipoOpDescricao">Descri&ccedil;&atilde;o</label>
          <input
            id="tipoOpDescricao"
            type="text"
            class="form-control form-control-lg"
            formControlName="tipoOpDescricao"
            placeholder="Informe a descri&ccedil;&atilde;o">
        </div>
      </div>
    </section>

    <section class="ordem-panel">
      <div class="panel-header">
        <i class="bi bi-shield-fill-check"></i>
        <h2>Opera&ccedil;&atilde;o Militar</h2>
      </div>

      <div class="row g-3">
        <div class="col-lg-5">
          <label class="form-label" for="opNome">Nome da Opera&ccedil;&atilde;o</label>
          <input
            id="opNome"
            type="text"
            class="form-control form-control-lg"
            formControlName="opNome"
            placeholder="Informe o nome da opera&ccedil;&atilde;o">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="opSigla">Sigla</label>
          <input
            id="opSigla"
            type="text"
            class="form-control form-control-lg"
            formControlName="opSigla"
            placeholder="Informe a sigla">
        </div>

        <div class="col-lg-3">
          <label class="form-label" for="opTipo">Tipo</label>
          <input
            id="opTipo"
            type="text"
            class="form-control form-control-lg"
            formControlName="opTipo"
            placeholder="Informe o tipo">
        </div>

        <div class="col-12">
          <label class="form-label" for="opDescricao">Descri&ccedil;&atilde;o da opera&ccedil;&atilde;o</label>
          <textarea
            id="opDescricao"
            class="form-control form-control-lg textarea-control"
            formControlName="opDescricao"
            placeholder="Informe a descri&ccedil;&atilde;o da opera&ccedil;&atilde;o"></textarea>
        </div>
      </div>
    </section>

    <div class="alert alert-success ordem-alert" *ngIf="submitMessage">
      {{ submitMessage }}
    </div>

    <footer class="ordem-actions">
      <button type="button" class="btn btn-outline-secondary btn-lg action-btn" (click)="clearForm()">
        <i class="bi bi-arrow-counterclockwise"></i>
        Limpar
      </button>

      <button type="submit" class="btn btn-success btn-lg action-btn px-4" [disabled]="form.invalid">
        <i class="bi bi-check-circle"></i>
        Emitir Ordem
      </button>
    </footer>
  </form>
</main>
