<main class="mov-page">
  <form class="mov-form-shell" [formGroup]="form" (ngSubmit)="onSubmit()">
    <header class="mov-page-header">
      <div class="page-icon">
        <i class="bi bi-box-arrow-right"></i>
      </div>

      <div>
        <h1 class="page-title">Registrar Sa&iacute;da</h1>
        <p class="page-subtitle">Preencha os dados abaixo para emitir a ordem de sa&iacute;da da viatura.</p>
      </div>
    </header>

    <section class="mov-panel">
      <div class="panel-header">
        <i class="bi bi-file-earmark-text-fill"></i>
        <h2>Dados da Sa&iacute;da</h2>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <label class="form-label" for="numeroOrdem">N&ordm; da Ordem</label>
          <input
            id="numeroOrdem"
            type="text"
            class="form-control form-control-lg"
            formControlName="numeroOrdem"
            placeholder="Informe o n&ordm; da ordem">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="data">Data</label>
          <input
            id="data"
            type="date"
            class="form-control form-control-lg"
            formControlName="data">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="horaSaidaPlanejada">Hora prevista de sa&iacute;da</label>
          <input
            id="horaSaidaPlanejada"
            type="time"
            class="form-control form-control-lg"
            formControlName="horaSaidaPlanejada">
        </div>
      </div>
    </section>

    <section class="mov-panel">
      <div class="panel-header">
        <i class="bi bi-truck-front-fill"></i>
        <h2>Dados da Viatura</h2>
      </div>

      <div class="row g-3 align-items-stretch">
        <div class="col-lg-8">
          <div class="vehicle-card">
            <span class="vehicle-label">Identifica&ccedil;&atilde;o da Viatura</span>
            <img [src]="qrCodeUrl" alt="QR Code Viatura" class="vehicle-qr">
          </div>
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="hodometroSaida">Hod&ocirc;metro de sa&iacute;da (km)</label>
          <input
            id="hodometroSaida"
            type="number"
            class="form-control form-control-lg"
            formControlName="hodometroSaida"
            placeholder="Informe a quilometragem">
        </div>
      </div>
    </section>

    <section class="mov-panel">
      <div class="panel-header">
        <i class="bi bi-bullseye"></i>
        <h2>Miss&atilde;o</h2>
      </div>

      <div class="row g-3">
        <div class="col-lg-6">
          <label class="form-label" for="destino">Destino</label>
          <input
            id="destino"
            type="text"
            class="form-control form-control-lg"
            formControlName="destino"
            placeholder="Informe o destino">
        </div>

        <div class="col-lg-6">
          <label class="form-label" for="missao">Miss&atilde;o</label>
          <input
            id="missao"
            type="text"
            class="form-control form-control-lg"
            formControlName="missao"
            placeholder="Informe a miss&atilde;o">
        </div>

        <div class="col-12">
          <label class="form-label" for="referencia">Refer&ecirc;ncia</label>
          <input
            id="referencia"
            type="text"
            class="form-control form-control-lg"
            formControlName="referencia"
            placeholder="Informe a refer&ecirc;ncia">
        </div>
      </div>
    </section>

    <section class="mov-panel">
      <div class="panel-header">
        <i class="bi bi-people-fill"></i>
        <h2>Envolvidos</h2>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <label class="form-label" for="motorista">Motorista</label>
          <input
            id="motorista"
            type="text"
            class="form-control form-control-lg"
            formControlName="motorista"
            placeholder="Informe o motorista">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="controladorExpedicao">Controlador de Expedi&ccedil;&atilde;o</label>
          <input
            id="controladorExpedicao"
            type="text"
            class="form-control form-control-lg"
            formControlName="controladorExpedicao"
            placeholder="Informe o controlador">
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="utilizador">Utilizador da viatura</label>
          <input
            id="utilizador"
            type="text"
            class="form-control form-control-lg"
            formControlName="utilizador"
            placeholder="Informe o utilizador">
        </div>
      </div>
    </section>

    <section class="mov-panel">
      <div class="panel-header">
        <i class="bi bi-card-text"></i>
        <h2>Observa&ccedil;&otilde;es</h2>
      </div>

      <label class="form-label" for="observacoes">Observa&ccedil;&otilde;es</label>
      <textarea
        id="observacoes"
        class="form-control form-control-lg textarea-control"
        formControlName="observacoes"
        placeholder="Informe observa&ccedil;&otilde;es adicionais"></textarea>
    </section>

    <div class="alert alert-success mov-alert" *ngIf="submitMessage">
      {{ submitMessage }}
    </div>

    <footer class="mov-actions">
      <button type="button" class="btn btn-outline-secondary btn-lg action-btn" (click)="clearForm()">
        <i class="bi bi-arrow-counterclockwise"></i>
        Limpar
      </button>

      <button type="submit" class="btn btn-success btn-lg action-btn px-4" [disabled]="form.invalid">
        <i class="bi bi-check-circle"></i>
        Emitir Ordem
      </button>
    </footer>
  </form>
</main>
