<section class="cadastro-list-page">
  <div class="section-heading">
    <div>
      <h2 class="section-title">{{ displayTitle }}</h2>
      <p class="section-subtitle">Gerencie os itens cadastrados com a identidade visual do SIGeM.</p>
    </div>

    <button type="button" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-list me-2"></i>
      Exibir Bot&otilde;es
    </button>
  </div>

  <div class="content-card">
    <div class="card-body p-4">
      <a href="#" class="small text-decoration-none fw-semibold filter-link" (click)="$event.preventDefault()">
        <i class="bi bi-sliders me-2"></i>
        Filtro Avan&ccedil;ado
      </a>
    </div>
  </div>

  <div class="selection-status">
    <span class="selection-badge">
      <i class="bi bi-check-lg"></i>
    </span>
    <span class="selection-label">{{ selectedSummary }}</span>
  </div>

  <div class="result-count">
    <i class="bi bi-check-square-fill"></i>
    <span>{{ registros.length }} registros encontrados</span>
  </div>

  <div class="content-card table-card">
    <div class="table-responsive">
      <table class="table align-middle mb-0 list-table">
        <thead class="table-light">
          <tr>
            <th style="width: 110px;">Selecione</th>
            <th *ngIf="hasSiglaColumn" style="width: 38%;">Sigla</th>
            <th>{{ valueColumnLabel }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let registro of registros">
            <td class="text-center">
              <input
                type="checkbox"
                class="form-check-input"
                [(ngModel)]="registro.selected">
            </td>
            <td *ngIf="hasSiglaColumn" class="table-value">{{ registro.sigla }}</td>
            <td class="table-value">{{ registro.descricao }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination-bar">
      <span class="page-number active">1</span>
      <span class="page-number">2</span>
      <span class="page-number">3</span>
      <span class="page-number">4</span>
      <span class="page-number">5</span>
    </div>
  </div>
</section>
