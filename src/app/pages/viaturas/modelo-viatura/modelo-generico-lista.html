<section class="modelo-generico-page">
  <div class="section-heading">
    <div>
      <h2 class="section-title">Modelo Gen&eacute;rico de Viaturas</h2>
      <p class="section-subtitle">Consulta de modelos gen&eacute;ricos cadastrados no SIGeM.</p>
    </div>

    <button type="button" class="btn btn-outline-secondary" (click)="toggleActionButtons()">
      <i class="bi bi-list me-2"></i>
      Exibir Bot&otilde;es
    </button>
  </div>

  <div class="action-buttons-panel" *ngIf="showActionButtons">
    <button type="button" class="btn btn-primary">
      <i class="bi bi-plus-circle me-2"></i>
      Cadastrar Modelo Gen&eacute;rico
    </button>
  </div>

  <div class="content-card">
    <div class="card-body p-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Descri&ccedil;&atilde;o</label>
          <input type="text" class="form-control" [(ngModel)]="descricao" placeholder="Informe a descri&ccedil;&atilde;o">
        </div>

        <div class="col-md-4">
          <label class="form-label fw-semibold">Sigla</label>
          <input type="text" class="form-control" [(ngModel)]="sigla" placeholder="Informe a sigla">
        </div>

        <div class="col-md-4">
          <div class="d-grid gap-2">
            <button type="button" class="btn btn-primary">
              <i class="bi bi-search me-2"></i>
              Pesquisar
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="clearFilters()">
              Limpar filtro
            </button>
          </div>
        </div>
      </div>

      <div class="mt-3">
        <a href="#" class="small text-decoration-none fw-semibold filter-link" (click)="toggleAdvancedFilters($event)">
          <i class="bi" [class.bi-chevron-down]="!showAdvancedFilters" [class.bi-chevron-up]="showAdvancedFilters"></i>
          Filtro Avan&ccedil;ado
        </a>
      </div>

      <div class="advanced-filter-panel mt-4" *ngIf="showAdvancedFilters">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Descri&ccedil;&atilde;o detalhada</label>
            <input type="text" class="form-control" placeholder="Refinar por descri&ccedil;&atilde;o">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Sigla t&eacute;cnica</label>
            <input type="text" class="form-control" placeholder="Refinar por sigla">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="result-count">
    <i class="bi bi-check-square-fill"></i>
    <span>{{ filteredRegistros.length }} registros encontrados</span>
  </div>

  <div class="content-card table-card">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 70px;">Selecione</th>
            <th>Sigla</th>
            <th>Descri&ccedil;&atilde;o</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let registro of filteredRegistros">
            <td class="text-center">
              <input type="checkbox" class="form-check-input">
            </td>
            <td class="text-primary fw-semibold">{{ registro.sigla }}</td>
            <td class="text-primary">{{ registro.descricao }}</td>
          </tr>
          <tr *ngIf="filteredRegistros.length === 0">
            <td colspan="3" class="text-center text-muted py-4">Nenhum modelo gen&eacute;rico encontrado.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination-bar d-flex justify-content-end align-items-center gap-2 px-3 py-2">
      <span class="page-number active">1</span>
      <span class="page-number">2</span>
      <span class="page-number">3</span>
      <span class="page-number">4</span>
      <span class="page-number">5</span>
    </div>
  </div>
</section>
