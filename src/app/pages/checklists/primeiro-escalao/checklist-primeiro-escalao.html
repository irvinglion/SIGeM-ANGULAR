<main class="checklist-page">
  <form class="checklist-shell">
    <header class="checklist-header">
      <div class="page-icon">
        <i class="bi bi-clipboard2-check-fill"></i>
      </div>

      <div>
        <h1 class="page-title">Checklist do Primeiro Escal&atilde;o</h1>
        <p class="page-subtitle">Assinale os itens observados na viatura antes da partida.</p>
      </div>
    </header>

    <section class="checklist-panel">
      <div class="panel-header">
        <i class="bi bi-search"></i>
        <h2>Inspe&ccedil;&atilde;o Antes da Partida</h2>
      </div>

      <div class="checklist-grid">
        <label class="check-item" *ngFor="let item of itensInspecaoAntesPartida; let i = index" [for]="'a' + i">
          <input class="form-check-input" type="checkbox" [id]="'a' + i">
          <span class="item-number">{{ i + 1 }}</span>
          <span class="item-text">{{ item }}</span>
        </label>
      </div>
    </section>

    <div class="alert alert-info checklist-alert" *ngIf="submitMessage">
      {{ submitMessage }}
    </div>

    <footer class="checklist-actions">
      <button type="button" class="btn btn-outline-danger btn-lg action-btn" (click)="reprovar()">
        <i class="bi bi-x-circle"></i>
        Reprovar
      </button>

      <button type="button" class="btn btn-success btn-lg action-btn" (click)="aprovar()">
        <i class="bi bi-check-circle"></i>
        Aprovar
      </button>
    </footer>
  </form>
</main>
