<main class="checklist-page">
  <form class="checklist-shell" (ngSubmit)="gravarChecklist()">
    <header class="checklist-header">
      <div class="page-icon">
        <i class="bi bi-clipboard2-pulse-fill"></i>
      </div>

      <div>
        <h1 class="page-title">Checklist de Retorno</h1>
        <p class="page-subtitle">Assinale os itens verificados durante o movimento e nos altos.</p>
      </div>
    </header>

    <section class="checklist-panel">
      <div class="panel-header">
        <i class="bi bi-sign-turn-right-fill"></i>
        <h2>Inspe&ccedil;&atilde;o Durante o Movimento</h2>
      </div>

      <div class="checklist-grid">
        <label class="check-item" *ngFor="let item of itensInspecaoDuranteMovimento; let i = index" [for]="'b' + i">
          <input class="form-check-input" type="checkbox" [id]="'b' + i">
          <span class="item-number">{{ i + 18 }}</span>
          <span class="item-text">{{ item }}</span>
        </label>
      </div>
    </section>

    <section class="checklist-panel">
      <div class="panel-header">
        <i class="bi bi-stop-circle-fill"></i>
        <h2>Inspe&ccedil;&atilde;o nos Altos</h2>
      </div>

      <div class="checklist-grid">
        <label class="check-item" *ngFor="let item of itensInspecaoAltos; let i = index" [for]="'c' + i">
          <input class="form-check-input" type="checkbox" [id]="'c' + i">
          <span class="item-number">{{ i + 26 }}</span>
          <span class="item-text">{{ item }}</span>
        </label>
      </div>
    </section>

    <div class="alert alert-info checklist-alert" *ngIf="submitMessage">
      {{ submitMessage }}
    </div>

    <footer class="checklist-actions">
      <button type="submit" class="btn btn-primary btn-lg action-btn">
        <i class="bi bi-save"></i>
        Gravar Checklist
      </button>
    </footer>
  </form>
</main>
