<main class="main-content">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h4 class="fw-bold text-center mb-4">CHECK LIST DE PRIMEIRO ESCAL&Atilde;O</h4>
      <p class="text-center text-muted">Assinale os itens observados na Viatura</p>

      <form (ngSubmit)="gravarChecklist()">
        <div class="border rounded p-3 mb-4">
          <h5 class="fw-bold text-primary mb-3">A) Inspe&ccedil;&atilde;o durante o movimento</h5>
          <div class="row row-cols-1 row-cols-md-2 g-2">
            <div class="col" *ngFor="let item of itensInspecaoDuranteMovimento; let i = index">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" [id]="'b' + i">
                <label class="form-check-label" [for]="'b' + i">{{ i + 18 }}) {{ item }}</label>
              </div>
            </div>
          </div>
        </div>

        <div class="border rounded p-3 mb-4">
          <h5 class="fw-bold text-primary mb-3">B) Inspe&ccedil;&atilde;o nos altos</h5>
          <div class="row row-cols-1 row-cols-md-2 g-2">
            <div class="col" *ngFor="let item of itensInspecaoAltos; let i = index">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" [id]="'c' + i">
                <label class="form-check-label" [for]="'c' + i">{{ i + 26 }}) {{ item }}</label>
              </div>
            </div>
          </div>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-save me-2"></i>
            Gravar Check List
          </button>
        </div>

        <div class="alert alert-info mt-3 mb-0" *ngIf="submitMessage">
          {{ submitMessage }}
        </div>
      </form>
    </div>
  </div>
</main>
