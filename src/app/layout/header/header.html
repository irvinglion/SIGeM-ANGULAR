<header class="bg-white shadow-sm px-3 d-flex align-items-center justify-content-between position-sticky top-0 z-3"
  style="height: var(--header-height);">
  <div class="brand-group d-flex align-items-center gap-3">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/61/Logo_of_the_Brazilian_Navy_%28symbol%29.png"
      class="img-fluid brand-logo" alt="Marinha do Brasil">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Bras%C3%A3o_do_Corpo_de_Fuzileiros_Navais.png"
      class="img-fluid brand-logo" alt="CFN">
    <h1 class="h4 mb-0 fw-bold text-dark brand-title">SIGeM 3.0 - Painel</h1>
  </div>

  <div class="user-menu">
    <button
      class="btn btn-link user-trigger text-decoration-none p-0"
      type="button"
      (click)="toggleUserMenu($event)">
      <span>{{ currentUserLabel }}</span>
      <i class="bi bi-chevron-down small"></i>
    </button>

    <div class="dropdown-menu user-dropdown" [class.show]="isUserMenuOpen" (click)="$event.stopPropagation()">
      <button class="dropdown-item" type="button" (click)="setAdminGeralMode()">Admin - Tela geral</button>
      <div class="dropdown-divider"></div>
      <h6 class="dropdown-header">Usu&aacute;rios</h6>
      <button class="dropdown-item" type="button" (click)="setGestorMode()">Gestor</button>
      <button class="dropdown-item" type="button" (click)="setMotoristaMode()">Motorista</button>
      <button class="dropdown-item" type="button" (click)="setControladorExpedicaoMode()">Controlador de Expedi&ccedil;&atilde;o</button>
      <div class="dropdown-divider"></div>
      <a class="dropdown-item" routerLink="/logout" (click)="closeUserMenu()">Sair</a>
    </div>
  </div>
</header>
