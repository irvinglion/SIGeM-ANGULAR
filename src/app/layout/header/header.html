<header class="bg-white shadow-sm px-3 d-flex align-items-center justify-content-between position-sticky top-0 z-3"
  style="height: var(--header-height);">

  <!-- botão agora fala com Angular, não com id + JS -->
  <button class="mobile-menu-btn btn btn-link p-0 d-none d-md-none"
          (click)="openMobileMenu()">
    <i class="bi bi-list fs-4"></i>
  </button>

  <div class="d-flex align-items-center gap-3">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/61/Logo_of_the_Brazilian_Navy_%28symbol%29.png"
         class="img-fluid" style="height: 40px;" alt="Marinha do Brasil">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Bras%C3%A3o_do_Corpo_de_Fuzileiros_Navais.png"
         class="img-fluid" style="height: 40px;" alt="CFN">
    <h1 class="h4 mb-0 fw-bold text-dark">SIGeM 3.0 – Painel</h1>
  </div>

  <div class="small text-muted">Gestor CMatFN</div>
</header>
