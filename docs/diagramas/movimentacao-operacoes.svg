<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1420" viewBox="0 0 2400 1420">
  <defs>
    <style>
      .title { font: bold 24px sans-serif; fill: #111; }
      .pkg { fill: none; stroke: #111; stroke-width: 2; }
      .box { fill: #f6f6f6; stroke: #181818; stroke-width: 1.5; rx: 8; ry: 8; }
      .name { font: bold 18px sans-serif; fill: #111; }
      .attr { font: 14px sans-serif; fill: #222; }
      .small { font: 13px sans-serif; fill: #222; }
      .line { stroke: #181818; stroke-width: 1.5; fill: none; }
      .label { font: 13px sans-serif; fill: #111; }
      .mult { font: 12px sans-serif; fill: #111; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#181818" />
    </marker>
  </defs>

  <text x="1200" y="34" text-anchor="middle" class="title">Diagrama de Classes - SIGEM - Movimentacao e Operacoes</text>

  <rect x="30" y="50" width="2340" height="1330" class="pkg" />
  <text x="50" y="80" class="name">Movimentacao e Operacoes</text>

  <g id="TipoOperacao">
    <rect x="90" y="130" width="260" height="100" class="box" />
    <text x="220" y="160" text-anchor="middle" class="name">TipoOperacao</text>
    <line x1="100" y1="172" x2="340" y2="172" class="line" />
    <text x="110" y="198" class="attr">codigo: String</text>
    <text x="110" y="220" class="attr">descricao: String</text>
  </g>

  <g id="OperacaoMilitar">
    <rect x="420" y="110" width="330" height="190" class="box" />
    <text x="585" y="140" text-anchor="middle" class="name">OperacaoMilitar</text>
    <line x1="430" y1="152" x2="740" y2="152" class="line" />
    <text x="440" y="178" class="attr">id: Long</text>
    <text x="440" y="200" class="attr">nome: String</text>
    <text x="440" y="222" class="attr">sigla: String</text>
    <text x="440" y="244" class="attr">descricao: String</text>
    <text x="440" y="266" class="attr">dataInicio: LocalDateTime</text>
    <text x="440" y="288" class="attr">dataFim: LocalDateTime</text>
    <text x="440" y="310" class="attr">status: String</text>
  </g>

  <g id="OM">
    <rect x="810" y="130" width="180" height="80" class="box" />
    <text x="900" y="177" text-anchor="middle" class="name">OM</text>
  </g>

  <g id="Usuario">
    <rect x="1870" y="140" width="220" height="80" class="box" />
    <text x="1980" y="187" text-anchor="middle" class="name">Usuario</text>
  </g>

  <g id="OrdemMovimentacao">
    <rect x="820" y="320" width="410" height="210" class="box" />
    <text x="1025" y="350" text-anchor="middle" class="name">OrdemMovimentacao</text>
    <line x1="830" y1="362" x2="1220" y2="362" class="line" />
    <text x="840" y="388" class="attr">id: Long</text>
    <text x="840" y="410" class="attr">numeroOrdem: String</text>
    <text x="840" y="432" class="attr">tipo: TipoOrdemMovimentacao</text>
    <text x="840" y="454" class="attr">status: StatusOrdemMovimentacao</text>
    <text x="840" y="476" class="attr">descricao: String</text>
    <text x="840" y="498" class="attr">dataInicio: LocalDateTime</text>
    <text x="840" y="520" class="attr">dataTermino: LocalDateTime</text>
  </g>

  <g id="DocumentoMovimentacao">
    <rect x="1450" y="330" width="360" height="150" class="box" />
    <text x="1630" y="360" text-anchor="middle" class="name">DocumentoMovimentacao</text>
    <line x1="1460" y1="372" x2="1800" y2="372" class="line" />
    <text x="1470" y="398" class="attr">id: Long</text>
    <text x="1470" y="420" class="attr">tipoDocumento: String</text>
    <text x="1470" y="442" class="attr">nomeArquivo: String</text>
    <text x="1470" y="464" class="attr">anexadoEm: LocalDateTime</text>
  </g>

  <g id="Viatura">
    <rect x="80" y="610" width="220" height="80" class="box" />
    <text x="190" y="657" text-anchor="middle" class="name">Viatura</text>
  </g>

  <g id="ParticipacaoViaturaMovimentacao">
    <rect x="400" y="560" width="460" height="200" class="box" />
    <text x="630" y="590" text-anchor="middle" class="name">ParticipacaoViaturaMovimentacao</text>
    <line x1="410" y1="602" x2="850" y2="602" class="line" />
    <text x="420" y="628" class="attr">id: Long</text>
    <text x="420" y="650" class="attr">status: StatusParticipacaoViatura</text>
    <text x="420" y="672" class="attr">dataApresentacao: LocalDateTime</text>
    <text x="420" y="694" class="attr">dataRetornoPrevisto: LocalDateTime</text>
    <text x="420" y="716" class="attr">dataRetornoEfetivo: LocalDateTime</text>
    <text x="420" y="738" class="attr">observacao: String</text>
  </g>

  <g id="Checklist">
    <rect x="1540" y="640" width="370" height="80" class="box" />
    <text x="1725" y="687" text-anchor="middle" class="name">ChecklistManutencaoPrimeiroEscalao</text>
  </g>

  <g id="OrdemDeSaidaViatura">
    <rect x="980" y="620" width="460" height="250" class="box" />
    <text x="1210" y="650" text-anchor="middle" class="name">OrdemDeSaidaViatura</text>
    <line x1="990" y1="662" x2="1430" y2="662" class="line" />
    <text x="1000" y="688" class="attr">id: Long</text>
    <text x="1000" y="710" class="attr">numeroOrdem: String</text>
    <text x="1000" y="732" class="attr">dataSaida: LocalDate</text>
    <text x="1000" y="754" class="attr">horaSaidaPlanejada: LocalTime</text>
    <text x="1000" y="776" class="attr">horaSaidaEfetiva: LocalDateTime</text>
    <text x="1000" y="798" class="attr">destino: String</text>
    <text x="1000" y="820" class="attr">missao: String</text>
    <text x="1000" y="842" class="attr">referencia: String</text>
    <text x="1000" y="864" class="attr">hodometroSaida: Integer</text>
  </g>

  <g id="OrdemDeRetornoViatura">
    <rect x="1010" y="1010" width="430" height="180" class="box" />
    <text x="1225" y="1040" text-anchor="middle" class="name">OrdemDeRetornoViatura</text>
    <line x1="1020" y1="1052" x2="1430" y2="1052" class="line" />
    <text x="1030" y="1078" class="attr">id: Long</text>
    <text x="1030" y="1100" class="attr">dataRetorno: LocalDate</text>
    <text x="1030" y="1122" class="attr">horaRetorno: LocalTime</text>
    <text x="1030" y="1144" class="attr">hodometroRetorno: Integer</text>
    <text x="1030" y="1166" class="attr">observacoesFinais: String</text>
    <text x="1030" y="1188" class="attr">irregularidades: String</text>
  </g>

  <g id="Enums">
    <rect x="1860" y="520" width="420" height="290" class="box" />
    <text x="2070" y="550" text-anchor="middle" class="name">Enumeracoes</text>
    <line x1="1870" y1="562" x2="2270" y2="562" class="line" />
    <text x="1880" y="588" class="attr">TipoOrdemMovimentacao</text>
    <text x="1900" y="610" class="small">SIMPLES</text>
    <text x="1900" y="630" class="small">COMPLETA</text>
    <text x="1880" y="666" class="attr">StatusOrdemMovimentacao</text>
    <text x="1900" y="688" class="small">RASCUNHO, EM_EXECUCAO</text>
    <text x="1900" y="708" class="small">CONCLUIDA, CANCELADA</text>
    <text x="1880" y="744" class="attr">StatusParticipacaoViatura</text>
    <text x="1900" y="766" class="small">PREVISTA, LIBERADA</text>
    <text x="1900" y="786" class="small">EM_DESLOCAMENTO, RETORNADA</text>
    <text x="1900" y="806" class="small">CANCELADA, INDISPONIVEL</text>
  </g>

  <line x1="350" y1="180" x2="420" y2="180" class="line" marker-end="url(#arrow)" />
  <text x="365" y="170" class="mult">1</text>
  <text x="400" y="170" class="mult">*</text>
  <text x="360" y="198" class="label">tipoOperacao</text>

  <line x1="750" y1="190" x2="810" y2="190" class="line" marker-end="url(#arrow)" />
  <text x="760" y="180" class="mult">*</text>
  <text x="792" y="180" class="mult">1</text>
  <text x="760" y="208" class="label">omResponsavel</text>

  <line x1="900" y1="210" x2="1025" y2="320" class="line" marker-end="url(#arrow)" />
  <text x="920" y="230" class="mult">1</text>
  <text x="995" y="300" class="mult">*</text>
  <text x="925" y="255" class="label">omResponsavel</text>

  <line x1="1980" y1="220" x2="1180" y2="320" class="line" marker-end="url(#arrow)" />
  <text x="1945" y="236" class="mult">1</text>
  <text x="1200" y="308" class="mult">*</text>
  <text x="1490" y="248" class="label">registradoPor</text>

  <line x1="750" y1="260" x2="820" y2="360" class="line" marker-end="url(#arrow)" />
  <text x="760" y="278" class="mult">0..1</text>
  <text x="800" y="338" class="mult">*</text>
  <text x="736" y="312" class="label">operacaoMilitar</text>

  <line x1="1230" y1="430" x2="1450" y2="405" class="line" marker-end="url(#arrow)" />
  <text x="1245" y="420" class="mult">1</text>
  <text x="1425" y="396" class="mult">*</text>
  <text x="1300" y="396" class="label">documentos</text>

  <line x1="1810" y1="390" x2="1870" y2="205" class="line" marker-end="url(#arrow)" />
  <text x="1818" y="378" class="mult">*</text>
  <text x="1860" y="220" class="mult">1</text>
  <text x="1780" y="306" class="label">anexadoPor</text>

  <line x1="300" y1="650" x2="400" y2="650" class="line" marker-end="url(#arrow)" />
  <text x="315" y="640" class="mult">1</text>
  <text x="382" y="640" class="mult">*</text>
  <text x="318" y="668" class="label">viatura</text>

  <line x1="760" y1="560" x2="930" y2="530" class="line" marker-end="url(#arrow)" />
  <text x="780" y="548" class="mult">*</text>
  <text x="905" y="522" class="mult">1</text>
  <text x="794" y="528" class="label">ordemMovimentacao</text>

  <line x1="860" y1="700" x2="980" y2="700" class="line" marker-end="url(#arrow)" />
  <text x="880" y="690" class="mult">1</text>
  <text x="954" y="690" class="mult">0..1</text>
  <text x="888" y="718" class="label">participacao</text>

  <line x1="1440" y1="730" x2="1540" y2="690" class="line" marker-end="url(#arrow)" />
  <text x="1450" y="720" class="mult">1</text>
  <text x="1520" y="682" class="mult">1</text>
  <text x="1438" y="694" class="label">checklistPrimeiroEscalao</text>

  <line x1="1225" y1="870" x2="1225" y2="1010" class="line" marker-end="url(#arrow)" />
  <text x="1235" y="888" class="mult">1</text>
  <text x="1235" y="995" class="mult">0..1</text>
  <text x="1240" y="944" class="label">ordemDeSaida</text>

  <line x1="1870" y1="180" x2="1440" y2="760" class="line" marker-end="url(#arrow)" />
  <text x="1840" y="196" class="mult">1</text>
  <text x="1450" y="748" class="mult">*</text>
  <text x="1640" y="470" class="label">motorista / controlador / utilizador</text>

  <line x1="1870" y1="180" x2="1440" y2="1090" class="line" marker-end="url(#arrow)" />
  <text x="1840" y="210" class="mult">1</text>
  <text x="1450" y="1080" class="mult">*</text>
  <text x="1650" y="650" class="label">motorista / controlador</text>
</svg>
